# Crypto Trading Bot Configuration
# =================================
#
# Binance Thailand: set BINANCE_API_KEY and BINANCE_API_SECRET in .env (see
# config.py). Live trading also respects LIVE_TRADING, MIN_ORDER_AMOUNT, etc.
# WebSocket (Binance.th): default is wss://www.binance.th/gstream per API docs (not stream.binance.th).
# Optional .env overrides:
#   BINANCE_WS_URL=wss://www.binance.th/nstream   # if your symbols are SITE type (see exchangeInfo)
#   BINANCE_WS_URL=wss://stream.binance.com:9443/stream   # global mirror if TH host blocked
# The api_keys block below is NOT used for Binance exchange auth; optional
# telegram_* values can supplement env / notifications.telegram_chat_id.
# bitkub_* keys are legacy placeholders and are ignored by the Binance runtime.
#
# Runtime alignment (see docs/CONFIGURATION_SCHEMA.md — Binance Thailand):
# - WebSocket: native Binance.th stream (binance_websocket) when installed; REST fallback if WS unavailable.
# - balance_monitor: uses Binance client; fiat/crypto history APIs are stubbed
#   on Binance.th, so deposit/withdraw detection from history is usually quiet.
# - monitoring reconciliation: exchange-agnostic (via api_client).
# - rebalance: exchange-agnostic; use USDT in targets if your book is USDT-quoted.

# API Keys (optional fallbacks; exchange secrets live in .env)
api_keys:
  binance_api_key: "YOUR_BINANCE_API_KEY"
  binance_secret_key: "YOUR_BINANCE_SECRET_KEY"
  bitkub_api_key: "YOUR_BITKUB_API_KEY"
  bitkub_secret_key: "YOUR_BITKUB_SECRET_KEY"
  telegram_bot_token: ""
  telegram_chat_id: ""

# Trading Settings
# Live orders: simulate_only false + read_only false, and LIVE_TRADING=true in .env
simulate_only: false                 # true = paper only (no real orders from YAML path)
read_only: false                     # true = executor skips orders (also BOT_READ_ONLY=true in .env)
trading:
  trading_pair: ""                  # Runtime may set from holdings / whitelist (Binance TH)
  startup_order_reconcile: true      # Reconcile pending local exchange orders against Binance at startup
  runtime_order_reconcile: true      # Reconcile pending local exchange orders periodically during runtime
  # Multi-pair support: bot will iterate through all pairs in data.pairs
  # trading_pairs list can be added for specific pairs to trade
  interval_seconds: 60               # Main loop interval in seconds
  timeframe: "15m"                    # Locked to 15m for runtime trading loop
  mode: "full_auto"                 # "semi_auto" = alert before trade, "full_auto" = auto trade
  min_order_amount: 10.0            # Quote notional minimum (Binance spot USDT pairs ~10); aligns with executor + PreTradeGate; use with portfolio.min_balance_threshold
  # PreTradeGate resolves per-mode max drift % (signal_price vs ticker). ``trading`` wins over ``risk``.
  max_slippage_pct:
    scalping: 2.0                     # ~1.5% observed drift; tighten when loop latency drops

# strategy_mode: which *mode* is active for risk/TF/thresholds (SL/TP %, intervals, etc.).
# The per-pair list of strategy *names* that actually run in the signal loop comes from
# mode_indicator_profiles.<mode>.active_strategies via signal_generator.get_active_strategies_for_mode()
# (not from strategies.enabled alone). Keep mode_indicator_profiles in sync with how you want to trade.
strategy_mode:
  active: "scalping"               # "standard" | "trend_only" | "scalping"
  trend_only:
    primary_timeframe: "15m"
    confirm_timeframe: "1h"
    min_confidence: 0.35
    min_strategies_agree: 1
    confirmations_required: 1
    confirmation_window_seconds: 180
    stop_loss_pct: 4.5              # ← ค่าที่ใช้จริง (trend_only mode signal SL)
    take_profit_pct: 10.0            # ← ค่าที่ใช้จริง (trend_only mode signal TP)
    max_hold_hours: 48
    min_time_between_trades_minutes: 5
    mtf_enabled: true
  scalping:
    primary_timeframe: "15m"
    confirm_timeframe: "15m"
    trend_timeframe: "1h"
    micro_trend_tolerance_pct: 0.15
    macd_trigger_lookback_bars: 3
    fast_ema: 9
    slow_ema: 21
    rsi_period: 7
    rsi_oversold: 34
    rsi_overbought: 66
    bollinger_period: 20
    bollinger_std: 2.0
    min_confidence: 0.30
    min_strategies_agree: 1
    confirmations_required: 1
    confirmation_window_seconds: 90
    pending_buy_timeout_seconds: 60
    pending_sell_timeout_seconds: 60
    stop_loss_pct: 1.0              # ← ค่าที่ใช้จริง (scalping mode signal SL)
    take_profit_pct: 3.0             # ← ค่าที่ใช้จริง (scalping mode signal TP)  net R:R≈1.67
    position_timeout_minutes: 30
    bootstrap_position_timeout_hours: 24  # bootstrap/held coins use best-effort real acquisition time
    max_trades_per_day: 8                 # AUDIT FIX: was 50 — overtrading was the dominant loss driver
    min_time_between_trades_minutes: 15   # AUDIT FIX: was 2 — give signals room to settle, prevent thrashing
    monitor_check_interval_seconds: 5
    max_position_per_trade_pct: 28.0      # FLOOR — dynamic overrides at runtime (DynamicRiskConfig scales to NAV)
    max_risk_per_trade_pct: 2.5           # FIX: 0.5% bound risk-based notional ~4 USDT vs min_order 10 — raise for ~42 USDT NAV
    position_risk_per_trade_pct: 2.5
    position_size_cap_pct: 28.0          # FLOOR — dynamic overrides at runtime (keeps in sync with max_position_per_trade_pct)

# ── Mode-Specific Indicator Profiles ─────────────────────────────────────
# active_strategies: authoritative list for the signal loop (see get_active_strategies_for_mode).
# strategy_mode (above) tunes risk/TF for the active mode; do not assume strategies.enabled in YAML
# replaces this list without checking SignalGenerator.
# กำหนดว่าแต่ละ mode ใช้ strategies ไหนบ้าง
# และ timeframe / parameter ที่เหมาะสม (อ่านโดย SignalGenerator)
# NOTE: ส่วนนี้ใช้ "ADD-ON" — ถ้า SignalGenerator ไม่ได้รับ mode จะ fallback
# ไปใช้ strategies ทุกตัวเหมือนเดิม (backward compatible)
mode_indicator_profiles:

  scalping:
    # AUDIT FIX: dropped legacy "scalping" strategy — its always-on signaling was
    # the single biggest loss source. Keeping the rebuilt SimpleScalpPlus + Sniper.
    active_strategies: ["machete_v8b_lite", "simple_scalp_plus"]
    primary_timeframe: "15m"
    confirm_timeframe: "15m"
    min_confidence: 0.40                  # AUDIT FIX: was 0.30 — require stronger conviction
    min_strategies_agree: 1
    # OR logic: each strategy can pass risk alone; no merged "all must agree" bar.
    independent_strategy_execution: true
    # SL/TP ต่อ mode (sync กับ strategy_mode.scalping)
    stop_loss_pct: 1.0
    take_profit_pct: 3.0
    atr_multiplier: 1.5                   # AUDIT FIX: was 1.2 — wider SL to survive normal noise
    confirmation_candles: 1
    min_hold_seconds: 30

  trend_only:
    # AUDIT FIX: dropped legacy trend_following / breakout from default profile.
    active_strategies: ["machete_v8b_lite", "simple_scalp_plus"]
    primary_timeframe: "15m"
    confirm_timeframe: "1h"
    min_confidence: 0.40                  # AUDIT FIX: was 0.35
    min_strategies_agree: 1
    independent_strategy_execution: true
    stop_loss_pct: 4.5
    take_profit_pct: 10.0
    atr_multiplier: 1.8
    confirmation_candles: 2
    min_hold_seconds: 300

  standard:
    # AUDIT FIX: dropped 4 legacy strategies that historically pyramided into trends.
    active_strategies: ["machete_v8b_lite", "simple_scalp_plus"]
    primary_timeframe: "15m"
    confirm_timeframe: "1h"
    min_confidence: 0.40                  # AUDIT FIX: was 0.35
    min_strategies_agree: 1
    independent_strategy_execution: true
    stop_loss_pct: 2.0
    take_profit_pct: 4.0
    atr_multiplier: 1.5
    confirmation_candles: 1
    min_hold_seconds: 60

# Adaptive Strategy Router - Auto Mode Switching
auto_mode_switch:
  enabled: false                      # AUDIT FIX: disabled until the bot has 30+ days of live PnL data
                                      # to validate the regime detector. Auto-switching while strategies
                                      # are still being tuned just adds noise to attribution.
  check_interval_seconds: 300         # Check market every 5 minutes
  min_switch_interval_seconds: 1800   # Min 30 minutes between mode switches (hysteresis)
  persistence_threshold: 3            # Mode recommendation must persist 3 checks before switching

# Market Analysis Configuration  
market_analysis:
  adx_thresholds:
    strong_trend: 40                  # ADX > 40 = strong trend
    weak_trend: 25                    # ADX > 25 = weak trend
  
  volatility_thresholds:
    high_pct: 3.0                     # ATR > 3% of price = high volatility
    low_pct: 1.0                      # ATR < 1% of price = low volatility
  
  volume_thresholds:
    high_ratio: 1.5                   # Current volume / 20d avg > 1.5 = high volume
    low_ratio: 0.7                    # Current volume / 20d avg < 0.7 = low volume

# BTC Correlation Analysis
btc_correlation:
  enabled: true                       # Include BTC correlation in mode decisions
  lookback_bars: 100                  # Bars to use for correlation calculation
  min_correlation_strong: 0.7         # > 0.7 = strong BTC correlation
  min_correlation_moderate: 0.5       # > 0.5 = moderate BTC correlation

# Multi-Timeframe Analysis Settings
multi_timeframe:
  enabled: true                      # Enable multi-timeframe analysis
  # Minimum OHLC rows per *gated* timeframe in SQLite before a pair is tradable
  # (MTF candle readiness). Clamped to [5, 2000]. Default if omitted: 35.
  # NOTE: Sniper (strategies/sniper.py) needs ~210 bars on the *primary* dataframe — higher than
  # this gate — so CLI may show MTF "ready" while Sniper alignment still shows -/-/- until history grows.
  required_candles_for_readiness: 35
  # Timeframes to analyze (in order of priority for storage/collection)
  # NOTE: higher_timeframes MUST be a subset of this list so data is actually collected
  timeframes: ["1m", "5m", "15m", "1h", "4h", "1d"]
  # Optional: subset for startup backfill only (defaults to all ``timeframes`` above).
  # startup_backfill_timeframes: ["5m", "15m", "1h"]
  # Backfill depth: pages older klines until at least this many rows exist per pair×timeframe.
  # Must cover the largest strategy lookback on the trading timeframe (Sniper EMA200 path needs 210 bars on 15m;
  # DB reads cap at 250). Default was 35 — too low for Sniper while MTF "ready" still showed true.
  backfill_target_bars: 250
  # Klines per REST request when backfilling (50–1000; Binance max 1000).
  # backfill_kline_limit_per_request: 1000
  # Walk history with repeated /klines calls before ``max_backfill_days`` (safety cap).
  # paged_backfill_enabled: true
  # max_backfill_days: 365   # or per-TF map, e.g. { "1m": 14, "1d": 730 }
  # backfill_max_pages: 200
  # Minimum timeframe alignment for trade (0.0-1.0)
  alignment_threshold: 0.4
  # Require higher timeframe (1h+) confirmation before trade
  require_htf_confirmation: false
  # Higher timeframes for trend bias
  higher_timeframes: ["1h", "4h", "1d"]
  # Risk parameters based on ATR
  atr_multiplier: 1.5               # AUDIT FIX: was 1.0 — too tight, caused noise stop-outs
  stop_loss_pct: 2.0                 # Fallback SL if no ATR (%)
  take_profit_pct: 4.0               # Fallback TP if no ATR (%)  net R:R≈1.75
  # Timeframe weights for signal aggregation
  tf_weights:
    "1m": 0.10
    "5m": 0.15
    "15m": 0.20
    "1h": 0.25
    "4h": 0.20
    "1d": 0.10
  # Signal source: technical strategy engine only
  signal_source: "strategy"

# Risk Management
# --- SL/TP: three runtime paths (not one single knob) ---
# 1) Strategy price levels: e.g. ScalpingStrategy uses strategies.scalping stop_loss_pct / take_profit_pct
#    on the signal (synced from strategy_mode.scalping when active — see main._apply_strategy_mode_profile).
# 2) ATR plan: when aggregated signal has no SL/TP prices, ExecutionPlan uses RiskManager.calc_sl_tp_from_atr
#    with MODE_ATR_PROFILES / risk.atr_multiplier (not the same as the % numbers in strategy_mode).
# 3) Percent fallback: bootstrap held positions & manual CLI track use resolve_effective_sl_tp_percentages().
#    With use_dynamic_sl_tp true, sl_tp_percent_source_when_dynamic chooses:
#      volatility = table by pair class (DEFAULT_SL_TP); risk_config = use risk.stop_loss_pct / take_profit_pct below.
#    main.py sets sl_tp_percent_source_when_dynamic=risk_config automatically for strategy_mode scalping / trend_only.
risk:
  use_fractional_kelly: false           # false = if Kelly edge <= 0, use fixed max_risk_per_trade_pct (no hard reject)
  max_risk_per_trade_pct: 2.5        # FIX: aligned with strategy_mode.scalping — unlock min notional with risk-based sizing
  max_daily_loss_pct: 3.0            # AUDIT FIX: was 5.0 — circuit breaker triggers earlier
  max_position_per_trade_pct: 28.0   # FLOOR — dynamic overrides at runtime; DynamicRiskConfig scales to current NAV
  max_open_positions: 6              # CEILING — dynamic may reduce based on NAV (slots = floor(85% / position_pct))
  max_daily_trades: 8               # AUDIT FIX: was 50 — keep trade frequency disciplined
  # Optional explicit % SL/TP for path (3); also overwritten by strategy_mode when scalping/trend_only is active.
  stop_loss_pct: 4.5               # Used when use_dynamic_sl_tp false, or when sl_tp_percent_source_when_dynamic is risk_config
  take_profit_pct: 10.0
  cool_down_minutes: 15              # AUDIT FIX: was 5 — give markets a beat between entries
  cooldown_mode: "per_pair"          # "per_pair" = each symbol cools independently; "global" = any trade blocks all
  # Optional — max % drift (signal vs ticker) before PreTradeGate blocks an entry.
  # Defaults when omitted: scalping 0.15, trend_only 0.30, standard 0.20 (see risk_management.MAX_SLIPPAGE_PCT).
  # trading.max_slippage_pct overrides risk.* for the same mode key.
  # max_slippage_pct:
  #   scalping: 0.30
  use_dynamic_sl_tp: true            # When true + sl_tp_percent_source_when_dynamic=volatility → table % for path (3)
  sl_tp_percent_source_when_dynamic: volatility  # volatility | risk_config (main sets risk_config for scalping/trend_only)
  atr_multiplier: 2.5                # 2.5x ATR for dynamic SL/TP (path 2 and RiskManager.calc_sl_tp_from_atr fallback)
  atr_period: 14                     # ATR lookback period
  # AUDIT FIX: enable per-pair loss-streak protection so we stop bleeding into the same losing pair.
  protections:
    max_consecutive_losses_per_pair: 3   # block new BUYs on a symbol after 3 consecutive losses
    pair_loss_cooldown_minutes: 120      # cooldown after streak triggers (was 60)

pre_trade_gate:
  enabled: true                      # Run gate checks before each order (includes optional pair-loss streak if configured above)

# Strategies
# AUDIT FIX: legacy "trend_following" / "mean_reversion" / "breakout" / "scalping"
# strategies have been rebuilt to fire only on the actual crossover bar (no more
# pyramiding). They are still loaded by SignalGenerator but excluded from the
# default trusted set because they have no live track record yet. Re-add them
# here only after a 2-week paper trade window confirms behaviour.
strategies:
  enabled:
    - "machete_v8b_lite"
    - "simple_scalp_plus"
  min_confidence: 0.40               # AUDIT FIX: was 0.35 — require stronger conviction
  min_strategies_agree: 1            # Minimum strategies that must agree before a trade is allowed
  independent_strategy_execution: true   # Overridden per mode in mode_indicator_profiles; default OR when profile omits it
  scalping:
    fast_ema: 9
    slow_ema: 21
    rsi_period: 7
    rsi_oversold: 34
    rsi_overbought: 66
    bollinger_period: 20
    bollinger_std: 2.0
    min_entry_confidence: 0.30
    stop_loss_pct: 1.0              # ค่านี้ sync จาก strategy_mode.scalping
    take_profit_pct: 3.0             # ค่านี้ sync จาก strategy_mode.scalping
    position_timeout_minutes: 30
    bootstrap_position_timeout_hours: 24
  machete_v8b_lite:
    enabled: true
    adx_threshold: 12.0
    atr_multiplier: 1.8
    risk_reward: 2.0
    min_buy_confidence: 0.65
    min_confirmations_buy: 3
    min_confirmations_sell: 2
    vol_threshold: 0.8
    ssl_period: 10
    rmi_period: 14
    rmi_momentum: 5
    rmi_buy_min: 52.0
    atr_volatility_cap_pct: 4.0
    sr_lookback: 50
    sr_proximity_pct: 2.0
    primary_timeframe: "15m"
    informative_timeframe: "1h"
    enable_relaxed_confirmation: true
    relaxed_requires_adx_and_volume: true
    relaxed_confirmation_delta: 1
    # Freqtrade-style compatibility knobs (mapped into runtime metadata/policy)
    stoploss: -0.10
    custom_stoploss: "dynamic_bb_trailing_profit_divider"
    trailing_stop: true
    minimal_roi:
      "0":   0.08
      "60":  0.04
      "120": 0.02
      "240": 0.0
  simple_scalp_plus:
    enabled: true
    hull_period: 16
    ema_fast: 9
    ema_slow: 21
    rsi_period: 14
    rsi_buy_min: 50
    rsi_buy_max: 70
    rsi_sell_max: 48
    adx_period: 14
    adx_threshold: 18.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    stoch_period: 14
    stoch_buy_k_min: 20
    stoch_buy_k_max: 80
    stoch_sell_k_max: 80
    volume_threshold: 1.05
    atr_multiplier: 1.2
    risk_reward: 1.8
    min_buy_confidence: 0.70
    min_confirmations_buy: 5
    min_confirmations_sell: 4
    primary_timeframe: "5m"
    informative_timeframe: "15m"
    # Freqtrade-style compatibility knobs (mapped into runtime metadata/policy)
    stoploss: -0.015
    trailing_stop: true
    trailing_stop_positive: 0.01
    trailing_stop_positive_offset: 0.015
    trailing_only_offset_is_reached: true
    minimal_roi:
      "0":  0.02
      "20": 0.015
      "30": 0.01
      "60": 0.007

# Auto Trader Settings (Full Auto Mode)
auto_trader:
  enabled: true                     # Set to true for full auto mode
  # Auto position sizing
  position_sizing:
    mode: "risk_based"               # "risk_based", "fixed", "kelly"
    fixed_amount: 12               # Fixed amount in quote currency, e.g. USDT (if mode=fixed)
    risk_per_trade_pct: 2.5          # % of portfolio to risk per trade
    max_position_pct: 28.0           # Maximum position as % of portfolio
  # Auto stop loss / take profit
  stop_loss:
    mode: "atr"                      # "atr", "fixed_pct", "trailing"
    atr_multiplier: 1.5              # AUDIT FIX: was 1.0 — 1.0x ATR was getting stopped out by noise
    fixed_pct: 5.0                   # Fixed % for SL (if mode=fixed)
  take_profit:
    mode: "risk_reward"              # "atr", "fixed_pct", "risk_reward"
    risk_reward_ratio: 2.0           # TP distance = SL distance * this ratio
    fixed_pct: 12.0                 # Fixed % for TP (if mode=fixed)
  # Trailing stop (for trailing mode)
  trailing:
    activation_pct: 2.0             # Activate trailing after X% profit
    step_pct: 0.5                    # Trail step %
  # Auto exit conditions
  auto_exit:
    check_interval_seconds: 10       # How often to check positions for SL/TP
    close_on_signal_opposite: true   # Auto close if opposite signal generated
    max_hold_hours: 48              # Force close after X hours

# Notifications
notifications:
  alert_channel: "telegram"          # "telegram" or "console"
  telegram_chat_id: ""               # Telegram chat ID for alerts
  telegram_command_polling_enabled: true   # Enable Telegram command polling in VPS tmux runtime
  send_alerts: true                  # Enable/disable alerts
  notify_ml_signals: false           # Deprecated after AI purge
  notify_position_updates: true      # Notify on SL/TP hits

weekly_review:
  enabled: true
  day_of_week: 6                     # Sunday (UTC)
  hour_utc: 17
  scheduler_poll_seconds: 60
  save_to_file: true
  send_telegram: true
  file_path: "weekly_reviews/review_{date}.md"

# Execution
execution:
  order_type: "limit"                # "limit" or "market"
  retry_attempts: 3                  # Number of retry attempts for failed orders
  retry_delay_seconds: 5             # Delay between retries
  order_timeout_seconds: 30          # Timeout for order execution
  enforce_min_profit_gate_for_voluntary_exit: true  # Block TIME/SIGSELL exits until net profit clears the threshold below
  min_voluntary_exit_net_profit_pct: 0.2  # Minimum net profit % after fees for TIME/SIGSELL exits
  trailing_activation_pct: 3.0       # FLOOR — dynamic sets 50% of take_profit_pct at runtime
  trailing_stop_pct: 1.5             # ลาก stop loss ตามหลังราคาปัจจุบัน 1.5%
  allow_trailing_stop: true          # อนุญาตให้ระบบประมวลผลการเลื่อนจุดตัดขาดทุนได้

minimal_roi:
  enabled: true
  scalping:
    "0": 0.03
    "15": 0.015
    "30": 0.008
    "60": 0.004
  standard:
    "0": 0.04
    "30": 0.02
    "60": 0.01
    "120": 0.004
  trend_only:
    "0": 0.08
    "60": 0.04
    "120": 0.02
    "240": 0.01

# Execution State Machine
# Separate ML entry decisions from order lifecycle and exits.
state_management:
  enabled: true
  entry_confidence_threshold: 0.35   # Must meet this confidence before confirmation counting starts
  confirmations_required: 1          # Consecutive BUY confirmations needed before entering
  confirmation_window_seconds: 180   # Reset confirmation if next signal arrives too late
  pending_buy_timeout_seconds: 120   # Cancel unmatched BUY and return to IDLE after this timeout
  pending_sell_timeout_seconds: 120  # Cancel unmatched SELL and restore IN_POSITION after this timeout
  allow_sell_entries_from_idle: true  # Allow SELL signals to liquidate held coins even without a tracked BUY position
  allow_trailing_stop: true          # อนุญาตให้ State Machine จัดการอัปเดต Trailing Stop แบบไดนามิกได้

# Market data / trading pairs
# Use data.pairs to enable multi-pair trading and collection.
data:
  auto_detect_held_pairs: true       # Use Hybrid Dynamic Coin Config to resolve runtime pairs
  pairs: []                          # Optional runtime override / extra filter (leave empty to use JSON whitelist order)
  portfolio_guard:
    held_coins_only: false           # Allow BUY entries on new whitelist coins; set true to trade only coins already held
  collect_interval_seconds: 60       # Interval for data collector loop
  hybrid_dynamic_coin_config:
    whitelist_json_path: "coin_whitelist.json"  # External whitelist source (JSON); also drives symbol_registry THB_* → *USDT map
    min_quote_balance_thb: 100.0     # Legacy key name: min quote (USDT for *USDT pairs) before opening a new BUY
    # Minimum USDT to attach whitelist pairs to runtime (WS, collector, trading_pairs). Can be below min_quote_balance_thb for small accounts.
    min_quote_balance_for_pairs: 10.0
    require_supported_market: true   # Drop whitelist entries not on Binance.th exchangeInfo
    include_assets_with_balance: true  # Keep whitelisted coins with real holdings even if quote (e.g. USDT) balance is low
    hot_reload_enabled: true         # Watch the JSON whitelist and refresh runtime pairs without restart
    reload_interval_seconds: 30      # Polling interval for whitelist change detection
  # Optional: drop low-liquidity pairs after startup (24h quote volume). 0 = disabled (see trading/pair_filters.py).
  pair_filters:
    min_quote_volume_24h: 0          # e.g. 500000 — require at least this USDT (quote) volume in last 24h

# Candle retention / database cleanup
candle_retention:
  enabled: true                      # Prune old candle rows so the local prices table does not grow forever
  run_on_startup: true               # Run one retention pass at bot startup
  cleanup_interval_hours: 12         # Scheduled cleanup cadence during runtime
  vacuum_after_cleanup: false        # VACUUM is expensive; keep opt-in for maintenance windows
  timeframes:
    "1m": 7                         # High-volume intraday data
    "5m": 14
    "15m": 30
    "1h": 60
    "4h": 90
    "1d": 180

# Portfolio
portfolio:
  initial_balance: 42.0            # Initial balance (for simulation)
  min_balance_threshold: 40.0       # FLOOR — dynamic sets 80% of current NAV at runtime (DynamicRiskConfig)
  read_only: false                  # Mirror top-level read_only; executor reads top-level + BOT_READ_ONLY env
  persist_path: "portfolio_state.json"  # Persist rebalancer state (cooldown survives restart)

# Portfolio Rebalancing
# ─────────────────────────────────────────────────────────────────────────────
# Automatic portfolio rebalancing to maintain target allocation
# ─────────────────────────────────────────────────────────────────────────────
rebalance:
  enabled: false                    # Permanently disabled in sniper mode
  allow_new_assets: true            # When rebalance is enabled later, allow allocation into new whitelist assets
  # Strategy: "threshold" | "calendar" | "risk" | "combined"
  strategy: "threshold"
  # Environment overrides supported:
  #   REBALANCE_TARGET_ALLOCATION=USDT:20,BTC:50,DOGE:30
  #   REBALANCE_TARGET_<ASSET>=<percent>
  #   REBALANCE_CASH_ASSETS=USDT,THB
  #   REBALANCE_SIDEWAYS_EXPOSURE_FACTOR=0.5
  
  # How often to check for rebalance (every N main loop iterations)
  check_interval: 5                 # Check every 5 iterations (at 60s interval = every 5 min)
  cooldown_minutes: 60              # Minimum minutes between rebalance executions (anti-whipsaw)
  trade_count_every: 5              # Trigger a rebalance review after every N successful entries (0 = disabled)
  sideways_regime: true             # Trigger rebalance review when ML/strategy regime becomes sideways
  cash_assets: ["USDT"]            # Quote/cash-like assets for Binance TH *USDT books
  sideways_exposure_factor: 0.5     # Keep only 50% of risk-asset exposure when regime is sideways
  
  # Threshold-based rebalancing
  threshold:
    threshold_pct: 10.0              # Rebalance if any asset drifts > 10% from target
    min_rebalance_pct: 1.0           # Minimum drift to trigger (avoid noise)
  
  # Calendar-based rebalancing
  calendar:
    frequency: "weekly"              # "daily" | "weekly" | "monthly"
    day_of_week: 0                   # 0=Monday, 6=Sunday (for weekly)
    hour_of_day: 0                   # Hour in UTC to execute
  
  # Risk-based rebalancing (adjust allocation by volatility)
  risk:
    volatility_window: 20            # Candles for volatility calculation
    risk_adjustment_factor: 0.5      # How aggressively to adjust (0-1)
    min_allocation_pct: 5.0          # Minimum allocation floor
    max_allocation_pct: 50.0         # Maximum allocation ceiling
    volatility_threshold_pct: 30     # Rebalance if volatility changes > X%
  
  # Target allocation (must sum to ~100%)
  # Adjust keys to match your book (e.g. USDT as cash for *USDT pairs on Binance TH)
  target_allocation:
    USDT: 20.0
    BTC: 35.0
    ETH: 20.0
    POL: 15.0
    DOGE: 10.0
  
  # Minimum trade value to execute (avoid tiny trades)
  min_trade_value: 10.0             # Ignore rebalance orders below this notional in quote terms (e.g. USDT)
  estimated_cost_pct: 0.2           # Estimated Binance TH round-trip fee cost % per rebalance (0.1% x 2)

# Wallet Balance / Deposit / Withdrawal Monitor (uses runtime api_client; Binance.th history feeds are stubbed)
balance_monitor:
  enabled: true                     # Poll balances in the background; history-based deposit/withdraw signals are limited on Binance.th
  poll_interval_seconds: 30         # Main polling interval
  persist_path: "balance_monitor_state.json"  # Seen tx IDs / status cache
  bootstrap_history_on_startup: true  # Mark existing wallet history as seen on first poll to avoid replaying old events after restart
  clean_startup_event_tape: true    # Clear stale persisted event tape on startup bootstrap
  event_tape_max_age_hours: 12      # Event Tape shows only recent balance events within this age
  quote_asset: "USDT"               # Cash asset monitored for quote-balance alerts
  quote_min_threshold: 0.0          # Alert when quote balance falls below this; env QUOTE_MIN_THRESHOLD overrides
  coin_min_threshold: 0.0           # Default per-coin critical threshold (or use COIN_MIN_THRESHOLD env)
  coin_min_thresholds: {}           # Optional overrides, e.g. BTC: 0.0005
  # Extra env overrides:
  #   QUOTE_MIN_THRESHOLD=500
  #   COIN_MIN_THRESHOLD=0.0001
  #   COIN_MIN_THRESHOLDS=BTC:0.0005,ETH:0.01

# ─────────────────────────────────────────────────────────────────────────────
# Health Check / Monitoring
# ─────────────────────────────────────────────────────────────────────────────
monitoring:
  enabled: true                     # Enable monitoring service

  # Health check HTTP server (for load balancer / uptime monitors)
  # Bind to loopback by default so the port is not exposed on the public internet.
  # Use "0.0.0.0" only behind a trusted reverse proxy / LB and host firewall.
  health_check_host: "127.0.0.1"     # Listen address (127.0.0.1 = localhost only)
  health_check_port: 8080           # Port for /health endpoint (set to 0 to disable)
  health_check_path: "/health"       # Endpoint path

  # Telegram heartbeat
  heartbeat_interval_minutes: 0    # Send heartbeat to Telegram every N minutes (0 = disabled)

  # Still-alive logging
  still_alive_interval_minutes: 5   # Log "still alive" every N minutes

  # Reconciliation with the live exchange (via api_client / executor)
  reconciliation_interval_minutes: 10  # Check bot state vs exchange state every N minutes

  # Auto-restart on crash
  auto_restart_on_crash: true       # Enable auto-restart watchdog
  restart_cooldown_seconds: 30       # Wait before restarting after crash

# ─────────────────────────────────────────────────────────────────────────────
# Dynamic Risk Parameters (merged into risk: section above)
# ─────────────────────────────────────────────────────────────────────────────
# Note: use_dynamic_sl_tp, atr_multiplier, atr_period are now in risk: section

#                                                                              
# WebSocket Real-time Prices
#                                                                              
# Live prices: Binance Thailand runtime now uses native Binance stream adapter.
# If websocket backend is unavailable at runtime, pricing falls back to REST.
websocket:
  enabled: true                      # Enable native websocket price path for supported runtime backends
  startup_retry_interval_seconds: 20 # Retry websocket startup in main loop when state is NOT STARTED
  reconnect_max_delay: 60.0          # Max seconds between reconnect attempts
  reconnect_multiplier: 1.5          # Exponential backoff multiplier
  ping_interval: 20                  # WebSocket ping interval (seconds)

# ─────────────────────────────────────────────────────────────────────────────
# Logging & Log Rotation
# ─────────────────────────────────────────────────────────────────────────────
logging:
  log_level: "INFO"                  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  enable_console: true               # Show coloured output in terminal
  enable_files: true                 # Write structured JSON logs to logs/

  # Rotation settings — size-based (error, trades, metrics)
  max_log_size_mb: 100               # Max file size before rotation (MB)
  backup_count: 10                   # Rotated copies to keep per file

  # Retention — time-based (debug.log rotates daily)
  debug_retention_days: 30           # Keep daily debug logs this many days

  # Startup cleanup (delete rotated files beyond retention)
  cleanup_on_startup: true           # Auto-purge old logs on bot start

  # Metrics flush interval
  metrics_flush_interval: 60         # Flush metrics snapshot every N seconds

# ─────────────────────────────────────────────────────────────────────────────
# CLI Dashboard (Rich Live terminal UI)
# ─────────────────────────────────────────────────────────────────────────────
cli_ui:
  enabled: true                      # Show Rich Live dashboard in terminal
  refresh_interval_seconds: 2.0      # Dashboard refresh rate
  bot_name: "Crypto Bot V1"          # Bot name shown in header
  command_listener_enabled: true     # Enable typing commands in footer chat
